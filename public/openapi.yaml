  '/api/admin/users/{user_id}/permissions':
    get:
      summary: 'List user permissions'
      operationId: listAdminUserPermissions
      description: 'Returns the user''s direct permissions and effective permissions (direct + role-derived).'
      tags:
        - 'Super Admin'
      responses:
        200:
          description: User permissions retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User permissions retrieved
                  data:
                    type: object
                    properties:
                      direct_permissions:
                        type: array
                        items:
                          type: string
                      effective_permissions:
                        type: array
                        items:
                          type: string
        401:
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    put:
      summary: 'Sync user permissions'
      operationId: syncAdminUserPermissions
      description: 'Replace the user''s direct permissions with the provided list. The list must contain valid permission names registered with the api guard. Used by super admin to grant or revoke individual permissions outside of role assignments.'
      tags:
        - 'Super Admin'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - permissions
              properties:
                permissions:
                  type: array
                  description: 'Array of permission names (strings) registered with the api guard.'
                  items:
                    type: string
                  example:
                    - manage_staff
                    - view_reports
      responses:
        200:
          description: Permissions synced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        401:
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        422:
          description: Validation failed or unknown permission name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    parameters:
      -
        in: path
        name: user_id
        description: 'The ID of the user.'
        example: 1
        required: true
        schema:
          type: integer
