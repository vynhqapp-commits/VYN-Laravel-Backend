openapi: 3.0.3
info:
  title: 'Laravel Swagger API Documentation'
  description: 'Backend API for the salon SaaS platform (Laravel + PostgreSQL) with JWT auth and tenant-scoped operations.'
  version: 1.0.0
servers:
  -
    url: https://admin.vynhq.com
    description: Production
  -
    url: http://127.0.0.1:8000
    description: Local (php artisan serve)
tags:
  -
    name: Authentication
    description: "\nAuthentication and profile management endpoints."
  -
    name: 'Public Booking'
    description: "\nPublic browsing, availability, and booking APIs."
  -
    name: Appointments
    description: "\nTenant appointment lifecycle APIs."
  -
    name: Sales
    description: "\nPOS sales and receipts APIs."
  -
    name: 'Tenant Management'
    description: "\nStaff invitation management endpoints."
  -
    name: Endpoints
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Use `/api/auth/login` (or related auth endpoints) to obtain a JWT token. Include `X-Tenant` for tenant-scoped endpoints. Authentication is configured globally in the OpenAPI security scheme.'
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    XTenantHeader:
      name: X-Tenant
      in: header
      required: false
      description: 'Tenant identifier (tenant ID or slug). Required on tenant-scoped endpoints.'
      schema:
        type: string
        example: '1'
  schemas:
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success
        data:
          nullable: true
      required:
        - success
        - message
    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: 'Validation failed'
        errors:
          nullable: true
      required:
        - success
        - message
security:
  -
    default: []
    bearerAuth: []
paths:
  /api/login:
    post:
      summary: Login
      operationId: login
      description: 'Authenticate a user with email/password and return a JWT token payload.'
      parameters:
        -
          in: header
          name: X-Tenant
          description: ''
          example: '1'
          schema:
            type: string
      responses:
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    email:
                      - 'The email field is required.'
                    password:
                      - 'The password field is required.'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation failed'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The email field is required.'
                        items:
                          type: string
                      password:
                        type: array
                        example:
                          - 'The password field is required.'
                        items:
