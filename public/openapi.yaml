                        type: string
                        example: 'http://localhost/api/public/salons?page=21'
                      next:
                        type: string
                        example: null
                        nullable: true
      tags:
        - 'Public Booking'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                search:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: b
                  nullable: true
                price_min:
                  type: number
                  description: 'Must be at least 0.'
                  example: 39
                  nullable: true
                price_max:
                  type: number
                  description: 'Must be at least 0.'
                  example: 84
                  nullable: true
                rating_min:
                  type: number
                  description: 'Must be at least 0. Must not be greater than 5.'
                  example: 1
                  nullable: true
                availability:
                  type: string
                  description: 'Must be a valid date in the format <code>Y-m-d</code>. Must be a date after or equal to <code>today</code>.'
                  example: '2052-05-20'
                  nullable: true
                gender_preference:
                  type: string
                  description: ''
                  example: ladies
                  enum:
                    - ladies
                    - gents
                    - unisex
                  nullable: true
                page:
                  type: integer
                  description: 'Must be at least 1.'
                  example: 22
                  nullable: true
                per_page:
                  type: integer
                  description: 'Must be at least 1. Must not be greater than 50.'
                  example: 7
                  nullable: true
