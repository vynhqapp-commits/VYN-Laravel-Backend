        schema:
          type: string
  /api/public/availability:
    get:
      summary: 'Check Availability'
      operationId: checkAvailability
      description: 'Public availability lookup for a salon, branch, service, and date. Anonymous.'
      security: []
      tags:
        - 'Public Booking'
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
        -
          in: query
          name: branch_id
          required: true
          schema:
            type: integer
            example: 1
        -
          in: query
          name: service_id
          required: true
          schema:
            type: integer
            example: 1
        -
          in: query
          name: date
          required: true
          schema:
            type: string
            format: date
            example: '2026-05-01'
      responses:
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    branch_id:
                      - 'The branch id field is required.'
                    service_id:
                      - 'The service id field is required.'
                    date:
                      - 'The date field is required.'
