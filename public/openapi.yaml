openapi: 3.0.3
info:
  title: 'Laravel Swagger API Documentation'
  description: 'Backend API for the salon SaaS platform (Laravel + PostgreSQL) with JWT auth and tenant-scoped operations.'
  version: 1.0.0
servers:
  -
    url: https://admin.vynhq.com
    description: Production
  -
    url: http://127.0.0.1:8000
    description: Local (php artisan serve)
tags:
  -
    name: Authentication
    description: "\nAuthentication and profile management endpoints."
  -
    name: 'Public Booking'
    description: "\nPublic browsing, availability, and booking APIs."
  -
    name: 'Customer Self-Service'
    description: "\nCustomer authenticated APIs: bookings, reviews, favorites."
  -
    name: Appointments
    description: "\nTenant appointment lifecycle APIs."
  -
    name: Sales
    description: "\nPOS sales and receipts APIs."
  -
    name: 'Tenant Management'
    description: "\nStaff invitation management endpoints."
  -
    name: Approvals
    description: "\nApproval queue: list/approve/reject and approval-gated actions."
  -
    name: Franchise
    description: "\nFranchise analytics and franchise-owner onboarding."
  -
    name: Settings
    description: "\nTenant settings endpoints."
  -
    name: Branches
    description: "\nBranch/location management endpoints."
  -
    name: Services
    description: "\nService catalog endpoints (services, categories, availability, add-ons)."
  -
    name: Catalog
    description: "\nPackages & memberships catalog endpoints."
  -
    name: Products
    description: "\nProduct catalog endpoints."
  -
    name: Inventory
    description: "\nInventory stock and movements endpoints."
  -
    name: Staff
    description: "\nStaff, schedules, time tracking, and HR endpoints."
  -
    name: Customers
    description: "\nCRM customer endpoints (customers, notes, packages, memberships)."
  -
    name: Reviews
    description: "\nReview moderation endpoints."
  -
    name: Coupons
    description: "\nCoupon management endpoints."
  -
    name: 'Gift Cards'
    description: "\nGift card lifecycle endpoints."
  -
    name: 'Cash Drawer'
    description: "\nCash drawer session endpoints."
  -
    name: Expenses
    description: "\nExpense tracking endpoints."
  -
    name: Debts
    description: "\nClient debt endpoints."
  -
    name: Reports
    description: "\nReporting and exports endpoints."
  -
    name: 'Monthly Closing'
    description: "\nMonthly closing/period lock endpoints."
  -
    name: Invoices
    description: "\nInvoice endpoints."
  -
    name: Ledger
    description: "\nLedger endpoints."
  -
    name: Commissions
    description: "\nCommission rules and earnings endpoints."
  -
    name: 'Time Off'
    description: "\nTime off request endpoints."
  -
    name: 'Time Blocks'
    description: "\nCalendar time block endpoints."
  -
    name: 'Super Admin'
    description: "\nPlatform-level admin APIs (super_admin)."
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Use `/api/auth/login` (or related auth endpoints) to obtain a JWT token. Include `X-Tenant` header for tenant-scoped endpoints.'
  parameters:
    XTenantHeader:
      name: X-Tenant
      in: header
      required: false
      description: 'Tenant identifier (tenant ID or slug). Required on tenant-scoped endpoints.'
      schema:
        type: string
        example: '1'
  schemas:
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success
        data:
          nullable: true
      required:
        - success
        - message
    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: 'Validation failed'
        errors:
          nullable: true
      required:
        - success
        - message
security:
  - bearerAuth: []
paths:
  /api/register:
    post:
      summary: 'Register Generic Customer'
      operationId: registerGenericCustomer
      description: ''
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
                - password_confirmation
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  example: secret123
                password_confirmation:
                  type: string
                  format: password
                  example: secret123
      responses:
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    name:
                      - 'The name field is required.'
                    email:
                      - 'The email field is required.'
                    password:
                      - 'The password field is required.'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation failed'
                  errors:
                    type: object
                    properties:
                      name:
                        type: array
                        example:
                          - 'The name field is required.'
                        items:
                          type: string
                      email:
                        type: array
                        example:
                          - 'The email field is required.'
                        items:
                          type: string
                      password:
                        type: array
                        example:
                          - 'The password field is required.'
                        items:
                          type: string
      tags:
        - Authentication
      security: []
  /api/auth/login:
    post:
      summary: Login
      operationId: login
      description: 'Authenticate a user with email/password and return a JWT token payload.'
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: secret123
      responses:
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    email:
                      - 'The email field is required.'
                    password:
                      - 'The password field is required.'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation failed'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The email field is required.'
                        items:
                          type: string
                      password:
                        type: array
                        example:
                          - 'The password field is required.'
                        items:
                          type: string
      tags:
        - Authentication
      security: []
  /api/auth/register/customer:
    post:
      summary: 'Register Customer'
      operationId: registerCustomer
      description: ''
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: customer@example.com
                password:
                  type: string
                  example: secret123
                full_name:
                  type: string
                  nullable: true
                  example: John Customer
                phone:
                  type: string
                  nullable: true
                  example: '+1234567890'
      responses:
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    email:
                      - 'The email field is required.'
                    password:
                      - 'The password field is required.'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation failed'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The email field is required.'
                        items:
                          type: string
                      password:
                        type: array
                        example:
                          - 'The password field is required.'
                        items:
                          type: string
      tags:
        - Authentication
      security: []
  /api/auth/register/salon-owner:
    post:
      summary: 'Register Salon Owner'
      operationId: registerSalonOwner
      description: ''
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - salon_name
                - email
                - password
              properties:
                salon_name:
                  type: string
                  example: Bliss Salon
                salon_address:
                  type: string
                  nullable: true
                  example: Downtown Street 12
                email:
                  type: string
                  format: email
                  example: owner@example.com
                password:
                  type: string
                  example: secret123
                full_name:
                  type: string
                  nullable: true
                  example: Salon Owner
                phone:
                  type: string
                  nullable: true
                  example: '+1234567890'
      responses:
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    salon_name:
                      - 'The salon name field is required.'
                    email:
                      - 'The email field is required.'
                    password:
                      - 'The password field is required.'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation failed'
                  errors:
                    type: object
                    properties:
                      salon_name:
                        type: array
                        example:
                          - 'The salon name field is required.'
                        items:
                          type: string
                      email:
                        type: array
                        example:
                          - 'The email field is required.'
                        items:
                          type: string
                      password:
                        type: array
                        example:
                          - 'The password field is required.'
                        items:
                          type: string
      tags:
        - Authentication
      security: []
  /api/auth/request-otp:
    post:
      summary: 'Request OTP'
      operationId: requestOTP
      description: ''
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  nullable: true
                  example: user@example.com
                identifier:
                  type: string
                  nullable: true
                  example: user@example.com
                type:
                  type: string
                  enum:
                    - phone
                    - email
                  example: email
                purpose:
                  type: string
                  enum:
                    - login
                    - register
                    - reset_password
                  example: login
      responses:
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    identifier:
                      - 'The identifier field is required.'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation failed'
                  errors:
                    type: object
                    properties:
                      identifier:
                        type: array
                        example:
                          - 'The identifier field is required.'
                        items:
                          type: string
      tags:
        - Authentication
      security: []
  /api/auth/verify-otp:
    post:
      summary: 'Verify OTP'
      operationId: verifyOTP
      description: ''
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                email:
                  type: string
                  nullable: true
                  example: user@example.com
                identifier:
                  type: string
                  nullable: true
                  example: user@example.com
                type:
                  type: string
                  enum:
                    - phone
                    - email
                  example: email
                purpose:
                  type: string
                  enum:
                    - login
                    - register
                    - reset_password
                  example: login
                code:
                  type: string
                  example: '123456'
      responses:
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    identifier:
                      - 'The identifier field is required.'
                    code:
                      - 'The code field is required.'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation failed'
                  errors:
                    type: object
                    properties:
                      identifier:
                        type: array
                        example:
                          - 'The identifier field is required.'
                        items:
                          type: string
                      code:
                        type: array
                        example:
                          - 'The code field is required.'
                        items:
                          type: string
      tags:
        - Authentication
      security: []
  /api/auth/google:
    post:
      summary: 'Google Auth'
      operationId: googleAuth
      description: ''
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - credential
              properties:
                credential:
                  type: string
                  example: eyJhbGciOi...
      responses:
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    credential:
                      - 'The credential field is required.'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation failed'
                  errors:
                    type: object
                    properties:
                      credential:
                        type: array
                        example:
                          - 'The credential field is required.'
                        items:
                          type: string
      tags:
        - Authentication
      security: []
  /api/auth/staff-invitations/accept:
    post:
      summary: 'Accept Staff Invitation'
      operationId: acceptStaffInvitation
      description: ''
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      responses:
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    token:
                      - 'The token field is required.'
                    name:
                      - 'The name field is required.'
                    password:
                      - 'The password field is required.'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation failed'
                  errors:
                    type: object
                    properties:
                      token:
                        type: array
                        example:
                          - 'The token field is required.'
                        items:
                          type: string
                      name:
                        type: array
                        example:
                          - 'The name field is required.'
                        items:
                          type: string
                      password:
                        type: array
                        example:
                          - 'The password field is required.'
                        items:
                          type: string
      tags:
        - Authentication
      security: []
  /api/auth/franchise-owner-invitations/accept:
    post:
      summary: 'Accept Franchise Owner Invitation'
      operationId: acceptFranchiseOwnerInvitation
      description: ''
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - password
                - password_confirmation
              properties:
                token:
                  type: string
                  example: 'plain_invite_token'
                name:
                  type: string
                  example: 'Fran Owner'
                password:
                  type: string
                  example: 'newpassword123'
                password_confirmation:
                  type: string
                  example: 'newpassword123'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Invitation accepted successfully. You can now log in.'
                  data: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Invitation accepted successfully. You can now log in.'
                  data:
                    nullable: true
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Validation failed'
                  errors:
                    token:
                      - 'The token field is required.'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation failed'
                  errors:
                    nullable: true
      tags:
        - Authentication
      security: []
  /api/me:
    get:
      summary: 'Current user profile'
      operationId: getApiMe
      description: 'Returns the authenticated user''s profile (id, email, name, role, tenant). Available to any authenticated role. Not tenant-scoped.'
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /api/logout:
    post:
      summary: ''
      operationId: postApiLogout
      description: ''
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /api/profile:
    patch:
      summary: ''
      operationId: patchApiProfile
      description: ''
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  nullable: true
                  maxLength: 100
                email:
                  type: string
                  format: email
                  nullable: true
                phone:
                  type: string
                  nullable: true
                  maxLength: 30
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /api/profile/change-password:
    post:
      summary: ''
      operationId: postApiProfileChangePassword
      description: ''
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - current_password
                - new_password
                - new_password_confirmation
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
                new_password_confirmation:
                  type: string
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /api/salon/profile:
    get:
      summary: ''
      operationId: getApiSalonProfile
      description: ''
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
    patch:
      summary: ''
      operationId: patchApiSalonProfile
      description: ''
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  nullable: true
                phone:
                  type: string
                  nullable: true
                address:
                  type: string
                  nullable: true
                timezone:
                  type: string
                  nullable: true
                currency:
                  type: string
                  nullable: true
                logo:
                  type: string
                  nullable: true
                gender_preference:
                  type: string
                  enum: [ladies, gents, unisex]
                  nullable: true
                cancellation_window_hours:
                  type: integer
                  nullable: true
                cancellation_policy_mode:
                  type: string
                  enum: [soft, hard, none]
                  nullable: true
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /api/public/salons:
    get:
      summary: 'List Salons'
      operationId: listSalons
      description: 'Public salon directory — anonymous browsing of active salons.'
      security: []
      tags:
        - 'Public Booking'
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: Success
                  data: []
                  meta:
                    current_page: 22
                    per_page: 7
                    total: 0
                    last_page: 1
                    from: null
                    to: null
                  links:
                    first: 'http://localhost/api/public/salons?page=1'
                    last: 'http://localhost/api/public/salons?page=1'
                    prev: 'http://localhost/api/public/salons?page=21'
                    next: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Success
                  data:
                    type: array
                    example: []
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 22
                      per_page:
                        type: integer
                        example: 7
                      total:
                        type: integer
                        example: 0
                      last_page:
                        type: integer
                        example: 1
                      from:
                        type: string
                        example: null
                        nullable: true
                      to:
                        type: string
                        example: null
                        nullable: true
                  links:
                    type: object
                    properties:
                      first:
                        type: string
                        example: 'http://localhost/api/public/salons?page=1'
                      last:
                        type: string
                        example: 'http://localhost/api/public/salons?page=1'
                      prev:
                        type: string
                        example: 'http://localhost/api/public/salons?page=21'
                      next:
                        type: string
                        example: null
                        nullable: true
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                search:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: b
                  nullable: true
                price_min:
                  type: number
                  description: 'Must be at least 0.'
                  example: 39
                  nullable: true
                price_max:
                  type: number
                  description: 'Must be at least 0.'
                  example: 84
                  nullable: true
                rating_min:
                  type: number
                  description: 'Must be at least 0. Must not be greater than 5.'
                  example: 1
                  nullable: true
                availability:
                  type: string
                  description: 'Must be a valid date in the format <code>Y-m-d</code>. Must be a date after or equal to <code>today</code>.'
                  example: '2052-05-20'
                  nullable: true
                gender_preference:
                  type: string
                  description: ''
                  example: ladies
                  enum:
                    - ladies
                    - gents
                    - unisex
                  nullable: true
                page:
                  type: integer
                  description: 'Must be at least 1.'
                  example: 22
                  nullable: true
                per_page:
                  type: integer
                  description: 'Must be at least 1. Must not be greater than 50.'
                  example: 7
                  nullable: true
  /api/public/salons/nearby:
    get:
      summary: 'Nearby Salons'
      operationId: nearbySalons
      description: 'Geo-search for salons near given lat/lng coordinates. Anonymous.'
      security: []
      tags:
        - 'Public Booking'
      parameters:
        - $ref: '#/components/parameters/XTenantHeader'
      responses:
        500:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
